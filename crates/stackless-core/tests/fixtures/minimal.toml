# The smallest valid stack: one service, no datastores, no secrets.

[stack]
name = "hello"

[services.web]
source      = { repo = "https://example.invalid/hello", ref = "main" }
root_origin = true
health      = { path = "/", contains = "hello" }

[services.web.local]
run = "python3 -m http.server $PORT --bind 127.0.0.1"

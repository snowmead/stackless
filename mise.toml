[tools]
rust                  = "1.96.0"
taplo                 = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-audit"   = "latest"
"cargo:cargo-deny"    = "latest"
"cargo:cargo-vet"     = "latest"
"cargo:cargo-dist"    = "latest"

[tasks]
# Formatting & lint (keep clippy/fmt wired even if not "crap" tools)
fmt    = "cargo fmt --all -- --check"
clippy = "cargo clippy --workspace --all-targets --all-features -- -D warnings"
taplo  = "taplo fmt --check --diff"
# Testing
test = "cargo nextest run --workspace"
# "Cargo crap" / supply chain (the point of the request)
audit        = "cargo audit"
deny         = "cargo deny check"
vet          = "cargo vet"
supply-chain = { depends = ["audit", "deny", "vet"] }
# One-command local gate (mirrors what CI will do)
check = { depends = ["fmt", "clippy", "taplo"] }
ci    = { depends = ["check", "test", "supply-chain"] }

[settings]
# optional: idiomatic for Rust projects

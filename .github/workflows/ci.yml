name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Fast, platform-independent formatting/linting gates.
  # These give quick feedback and can fail the PR early.
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache mise installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: Install tools
        run: mise install

      - name: cargo fmt
        run: mise run fmt

      - name: taplo
        run: mise run taplo

  # Compilation-based lints. Run on all supported OSes so we catch
  # platform-specific warnings.
  clippy:
    name: clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache mise installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: Install tools
        run: mise install

      - name: Rust / Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: clippy
        run: mise run clippy

  # The main test suite. Runs on all supported OSes.
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache mise installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: Install tools
        run: mise install

      - name: Rust / Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: nextest
        run: mise run test

  # Supply-chain / "cargo crap" security & policy gates.
  # These are not OS-specific, so we run them once on the fastest runner.
  # They are completely independent of the other jobs.
  supply-chain:
    name: supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Cache mise installs
        uses: actions/cache@v4
        with:
          path: ~/.local/share/mise
          key: ${{ runner.os }}-mise-${{ hashFiles('mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-mise-

      - name: Install tools
        run: mise install

      - name: Rust / Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo audit
        run: mise run audit

      - name: cargo deny
        run: mise run deny

      - name: cargo vet
        run: mise run vet
